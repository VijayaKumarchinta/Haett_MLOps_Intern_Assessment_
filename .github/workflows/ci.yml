name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  MLFLOW_TRACKING_URI: "sqlite:///mlruns/ci_mlflow.db"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
          pip install -r requirements-dev.txt

      - name: Check formatting with Black
        run: black --check --diff src/ tests/ scripts/

      - name: Lint with Ruff
        run: ruff check src/ tests/ scripts/

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  pipeline-smoke:
    name: Pipeline Smoke Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data/raw data/processed data/features models mlruns

      - name: Run full pipeline (quick mode - no hparam tuning)
        run: |
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, '.')
          from src.data.generate_data import generate_all_data
          from src.data.preprocess import preprocess_all
          from src.data.feature_engineering import build_feature_matrix
          from src.models.train import train_all_models

          print('Step 1/4: Generating data...')
          generate_all_data()

          print('Step 2/4: Preprocessing...')
          preprocess_all()

          print('Step 3/4: Feature engineering...')
          X, y = build_feature_matrix()

          print('Step 4/4: Training (no tuning)...')
          results, best = train_all_models(tune=False)
          print(f'Best model: {best}')
          print(f'F1: {results[best][\"metrics\"][\"f1_score\"]}')
          "

      - name: Verify model artifacts exist
        run: |
          echo "Checking model artifacts..."
          test -f models/churn_model.pkl && echo "  - churn_model.pkl: OK"
          test -f models/tuned_model.pkl && echo "  - tuned_model.pkl: OK"
          test -f models/optimal_threshold.txt && echo "  - optimal_threshold.txt: OK"
          test -f models/feature_names.txt && echo "  - feature_names.txt: OK"
          test -f models/model_metadata.json && echo "  - model_metadata.json: OK"
          echo "All artifacts present."

  docker:
    name: Docker Build
    needs: [lint, test, pipeline-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: haett-churn-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
