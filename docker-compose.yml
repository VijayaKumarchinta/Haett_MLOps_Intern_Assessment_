name: haett-mlops

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: haett-churn-api:latest
    container_name: haett-churn-api
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - haett-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.0
    container_name: haett-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - /mlruns
    restart: unless-stopped
    init: true
    networks:
      - haett-network

networks:
  haett-network:
    driver: bridge