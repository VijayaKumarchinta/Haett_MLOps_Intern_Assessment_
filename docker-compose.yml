version: "3.8"

services:
  api:
    build: .
    container_name: haett-churn-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - haett-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.0
    container_name: haett-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns
    networks:
      - haett-network

networks:
  haett-network:
    driver: bridge
